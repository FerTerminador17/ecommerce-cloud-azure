<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drop Store | Erlan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>👟 Drops Disponíveis</h1>

    <form id="form">
        <input type="hidden" id="tenis-id">
        <input type="text" id="nome" placeholder="Nome do modelo" required>
        <input type="text" id="marca" placeholder="Marca (Ex: Nike)" required>
        <input type="number" id="preco" placeholder="Preço (R$)" required>
        <input type="text" id="foto" placeholder="Link da foto (URL)" required>
        <select id="tipo">
            <option value="Novo">Novo</option>
            <option value="Usado">Usado</option>
        </select>
        <button type="submit" id="btn-salvar">Adicionar Drop</button>
    </form>

    <div id="vitrine" class="vitrine">
        </div>

    <script src="script.js"></script>
</body>
</html>
